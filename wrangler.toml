# Cloudflare Pages 환경 설정 파일
name = "smp-curve-studio"
pages_build_output_dir = "dist"

# 카카오 JS 키(공개용) — 도메인 제한은 카카오 개발자 콘솔에서 관리
[vars]
KAKAO_APP_KEY = "24f1b05cf10ce5e4d05d7ad1aaa97213"
NAVER_TALK_URL = "https://talk.naver.com/WX53UE5"

# D1 Database 바인딩
[[d1_databases]]
binding = "DB"
database_name = "smp-studio-db"
database_id = "5011362c-7929-466b-a424-7f4bde29aec5"

# R2 Storage 바인딩
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "smp-studio-media"
preview_bucket_name = "smp-studio-media-preview"
